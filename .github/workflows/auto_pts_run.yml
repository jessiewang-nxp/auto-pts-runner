name: auto-pts-run

on:
  workflow_dispatch:
    inputs:
      board:
        required: true
        type: string
      cases:
        required: true
        type: string
      autopts_ref:
        required: true
        type: string
      zephyr_ref:
        required: true
        type: string
      issue_url:
        required: false
        type: string
      comment_url:
        required: false
        type: string
      issue_number:
        required: true
        type: string
      nb:
        required: false
        type: string
        default: "false"

permissions:
  issues: write
  contents: read

concurrency:
  group: auto-pts-${{ inputs.issue_number }}-rt1170evkb
  cancel-in-progress: true

jobs:
  run:
    runs-on: self-hosted
    timeout-minutes: 600

    steps:
      - name: Echo inputs
        shell: cmd
        run: |
          echo board=${{ inputs.board }}
          echo cases=${{ inputs.cases }}
          echo autopts_ref=${{ inputs.autopts_ref }}
          echo zephyr_ref=${{ inputs.zephyr_ref }}
          echo issue_url=${{ inputs.issue_url }}
          echo comment_url=${{ inputs.comment_url }}
          echo nb=${{ inputs.nb }}

      - name: Activate venv and run auto_pts_call.py
        shell: cmd
        run: |
          setlocal enableextensions
          call "C:\Users\nxf60078\zephyrproject\.venv\Scripts\activate.bat"
          cd /d "C:\Dpc\conn_oobe\bt_cert\zephyr_pts_scripts"

          echo GITHUB_RUN_ID=%GITHUB_RUN_ID%
          echo COMMENT_URL=${{ inputs.comment_url }}
          echo NB=${{ inputs.nb }}

          if /I "${{ inputs.nb }}"=="true" (
            echo Running with --nb (no build/flash)
            python auto_pts_call.py -b "${{ inputs.board }}" -c "${{ inputs.cases }}" -r "${{ inputs.autopts_ref }}" -p "${{ inputs.zephyr_ref }}" --nb
          ) else (
            python auto_pts_call.py -b "${{ inputs.board }}" -c "${{ inputs.cases }}" -r "${{ inputs.autopts_ref }}" -p "${{ inputs.zephyr_ref }}"
          )

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pts-report
          path: |
            C:\Dpc\auto-pts\report.xlsx
            C:\Dpc\auto-pts\report.txt
          if-no-files-found: warn

      - name: Upload logs (best-effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-pts-logs
          path: |
            C:\Dpc\auto-pts\logs\*.log
            C:\Dpc\conn_oobe\bt_cert\zephyr_pts_scripts\*.log
          if-no-files-found: ignore

      - name: Comment back summary + Results on Github link
        if: always()
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BOARD: ${{ inputs.board }}
          CASES: ${{ inputs.cases }}
          AUTOPTS_REF: ${{ inputs.autopts_ref }}
          ZEPHYR_REF: ${{ inputs.zephyr_ref }}
          NB: ${{ inputs.nb }}
        run: |
          setlocal enableextensions
          call "C:\Users\nxf60078\zephyrproject\.venv\Scripts\activate.bat"
          python "%GITHUB_WORKSPACE%\.github\scripts\comment_back.py"
